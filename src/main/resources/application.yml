server:
  port: 8087

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coach_notification}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:YOhVIILWnA9ZCbUShsWIzqlVpDhpKEaYGAAjnplCmU4=}

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
